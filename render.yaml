# Render blueprint (paid plans support preDeployCommand).
# Render FREE tier: use only Build + Start — migrations run in start-render.sh.

services:
  - type: web
    name: pixora-api
    runtime: node
    rootDir: backend
    buildCommand: bun install --frozen-lockfile && bunx prisma generate
    startCommand: bun run start
    healthCheckPath: /health
